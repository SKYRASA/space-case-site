<!DOCTYPE html>
<html>
<head>
<title>Space Cases</title>

<style>
body{
background:black;
color:white;
font-family:Arial;
text-align:center;
}

.case{
width:200px;
height:200px;
background:linear-gradient(45deg,#1b1bff,#7a00ff);
margin:50px auto;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
cursor:pointer;
}

.result{
margin-top:30px;
font-size:24px;
}
</style>

</head>

<body>

<h1>🚀 Space Case Opening</h1>

<div class="case" onclick="openCase()">
🌌 OPEN CASE
</div>

<div class="result" id="result"></div>

<script>

function openCase(){

let drops = [
"🟦 Common Skin",
"🟩 Rare Skin",
"🟪 Epic Skin",
"🟨 Legendary Skin",
"🌠 Galaxy Skin"
]

let random = Math.floor(Math.random()*drops.length)

document.getElementById("result").innerHTML =
"You got: " + drops[random]

}

</script>

</body>
</html>
